# SonarQube Cloud - CI-based analysis (GitHub Actions).
# Read by the SonarScanner; requires Automatic Analysis to be DISABLED in the
# SonarQube Cloud UI (the two modes are mutually exclusive).

sonar.organization=jzahraoui
sonar.projectKey=jzahraoui_sangoku-site

# Analyse the whole repository (parity with the previous Automatic Analysis),
# minus dependencies, build artifacts and binary assets.
# The *.ico exclusion silences the "Invalid character encountered ... for
# encoding UTF-8" warning: favicon.ico is a binary file that indexing sensors
# try to read as text; declaring the encoding does not help a binary file, it
# must be excluded.
sonar.sources=.
sonar.exclusions=node_modules/**,dist/**,coverage/**,**/*.ico

# All text sources are valid UTF-8; declare it so Sonar never guesses per file.
sonar.sourceEncoding=UTF-8
